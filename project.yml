name: FaithfulSteward
options:
  bundleIdPrefix: com.faithfulsteward
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "1"
  DEVELOPMENT_TEAM: ""  # 替换为你的 Apple Team ID

targets:
  FaithfulSteward:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - ".github/"
          - "README.md"
    info:
      path: Resources/Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.faithfulsteward.app
      INFOPLIST_FILE: Resources/Info.plist
      SWIFT_VERSION: "5.9"

  FaithfulStewardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - tithe_budgetTests
    dependencies:
      - target: FaithfulSteward
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.faithfulsteward.tests
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FaithfulSteward.app"
