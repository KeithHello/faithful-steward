name: FaithfulSteward
options:
  bundleIdPrefix: com.faithfulsteward
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "1"
  DEVELOPMENT_TEAM: ""

targets:
  FaithfulSteward:
    type: application
    platform: iOS
    sources:
      - Core
      - Features
      - Shared
      - Resources
      - tithe_budgetApp.swift
    info:
      path: Resources/Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.faithfulsteward.app
      INFOPLIST_FILE: Resources/Info.plist
      SWIFT_VERSION: "5.9"
      TARGETED_DEVICE_FAMILY: "1"

  FaithfulStewardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - tithe_budgetTests
    dependencies:
      - target: FaithfulSteward
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.faithfulsteward.tests
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FaithfulSteward.app"
