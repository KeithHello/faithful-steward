name: FaithfulSteward
options:
  bundleIdPrefix: com.faithfulsteward
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.4"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual

targets:
  FaithfulSteward:
    type: application
    platform: iOS
    sources:
      - path: Core
      - path: Features  
      - path: Shared
      - path: Resources
        excludes:
          - "**/Info.plist"
      - path: tithe_budgetApp.swift
    info:
      path: Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.faithfulsteward.app
        INFOPLIST_FILE: Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1"

  FaithfulStewardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: tithe_budgetTests
        excludes:
          - "**/*.md"
    dependencies:
      - target: FaithfulSteward
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.faithfulsteward.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FaithfulSteward.app"
