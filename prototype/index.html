<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忠心好管家 — Faithful Steward</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --font: 'Plus Jakarta Sans', sans-serif;
  --accent: #5B8C5A; --accent-soft: #EDF5EC; --accent-deep: #3D6B3C;
  --bg: #F8F8F7; --surface: #FFFFFF; --surface-2: #F3F2F0;
  --border: rgba(0,0,0,0.05); --border-strong: rgba(0,0,0,0.09);
  --text: #1A1A18; --text-2: #5C5B58; --text-3: #94928E;
  --success: #4A9E5C; --success-bg: #EDF7EF;
  --danger: #D94A4A; --danger-bg: #FDF0F0;
  --r-sm: 10px; --r-md: 16px; --r-lg: 22px; --r-xl: 28px; --r-full: 9999px;
  --shadow: 0 1px 2px rgba(0,0,0,0.02), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 4px rgba(0,0,0,0.02), 0 8px 28px rgba(0,0,0,0.06);
  --shadow-float: 0 8px 36px rgba(0,0,0,0.08);
  --shadow-glow: 0 0 40px rgba(91,140,90,0.15);
  --ease: cubic-bezier(0.32, 0.72, 0, 1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:#E6E5E2;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:40px 16px;-webkit-font-smoothing:antialiased}

.iphone{width:393px;height:852px;background:var(--bg);border-radius:44px;overflow:hidden;position:relative;box-shadow:0 8px 32px rgba(0,0,0,0.12),0 0 0 8px #1A1A18,0 0 0 10px #3A3A3A;display:flex;flex-direction:column}
.dynamic-island{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:126px;height:34px;background:#1A1A18;border-radius:20px;z-index:2000}

.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:54px 16px 100px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:0}
.tab{display:none;flex-direction:column;gap:10px;padding-bottom:20px}
.tab.active{display:flex}

/* TabBar - 4 items */
.tabbar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:355px;z-index:1500}
.tabbar-inner{display:flex;align-items:center;justify-content:space-around;background:rgba(255,255,255,0.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:var(--r-full);padding:5px;box-shadow:var(--shadow-float);border:1px solid rgba(0,0,0,0.05)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:8px 0;border-radius:var(--r-full);cursor:pointer;transition:all 0.5s var(--ease);-webkit-tap-highlight-color:transparent;user-select:none}
.tab-item .ti-icon{font-size:16px;opacity:0.4;transition:all 0.5s var(--ease)}
.tab-item .ti-label{font-size:9px;font-weight:600;color:var(--text-3);transition:all 0.5s var(--ease)}
.tab-item.active{background:var(--accent-soft)}
.tab-item.active .ti-icon{opacity:1}
.tab-item.active .ti-label{color:var(--accent)}

/* Headers */
.hdr{margin-bottom:14px}
.hdr-tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);padding:4px 12px;border-radius:var(--r-full);margin-bottom:8px}
.hdr-title{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-0.02em;line-height:1.1}
.hdr-sub{font-size:13px;color:var(--text-3);margin-top:4px;font-weight:500}

/* Cards */
.card{background:var(--surface);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card-elevated{box-shadow:var(--shadow-md)}

/* Shared FAB */
.fab-wrap{position:absolute;bottom:110px;left:50%;transform:translateX(-50%) translateY(20px);z-index:1400;opacity:0;pointer-events:none;transition:all 0.4s var(--ease)}
.fab-wrap.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.fab{display:flex;align-items:center;justify-content:center;gap:8px;height:48px;padding:0 24px;border:none;border-radius:var(--r-full);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.4s var(--ease);-webkit-tap-highlight-color:transparent}
.fab:active{transform:scale(0.96)}
.fab .fab-icon{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:11px}
.fab-record{background:var(--accent);box-shadow:0 6px 24px rgba(91,140,90,0.35)}

/* Amount Hero */
.hero{text-align:center;padding:16px 0 10px}
.hero-cur{font-size:16px;font-weight:600;color:var(--text-3);margin-bottom:2px}
.hero-num{font-size:40px;font-weight:800;color:var(--text);letter-spacing:-0.03em;min-height:46px;line-height:1;transition:all 0.3s var(--ease);font-variant-numeric:tabular-nums}
.hero-num.placeholder{color:var(--text-3);font-size:22px;font-weight:500}

/* Voice */
.voice-wrap{display:flex;justify-content:center;margin-bottom:6px}
.voice-btn{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--surface);box-shadow:var(--shadow-md);border:1px solid var(--border);cursor:pointer;transition:all 0.5s var(--ease);-webkit-tap-highlight-color:transparent;user-select:none;font-size:22px;position:relative}
.voice-btn:active{transform:scale(0.96)}
.voice-btn.recording{background:var(--danger);color:#fff;border-color:transparent;animation:vPulse 1.4s var(--ease) infinite}
@keyframes vPulse{0%,100%{box-shadow:0 0 0 0 rgba(217,74,74,0.3)}50%{box-shadow:0 0 0 12px rgba(217,74,74,0)}}
.voice-hint{text-align:center;font-size:11px;font-weight:500;color:var(--text-3);margin-bottom:10px}

/* Inline Input */
.input-wrap{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:var(--r-md);padding:0 16px;height:46px;box-shadow:var(--shadow);border:1px solid var(--border);transition:all 0.3s var(--ease);margin-bottom:10px}
.input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.input-prefix{font-size:16px;font-weight:700;color:var(--text-3)}
.input-wrap input{flex:1;border:none;outline:none;background:transparent;font-family:var(--font);font-size:20px;font-weight:700;color:var(--text);caret-color:var(--accent)}
.input-wrap input::placeholder{color:var(--text-3);font-weight:500;font-size:15px}

/* Category Grid */
.sec-title{font-size:11px;font-weight:700;color:var(--text-2);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:8px;padding-left:2px}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.cat-card{position:relative;background:var(--surface);border-radius:var(--r-md);border:1.5px solid transparent;padding:12px 6px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all 0.35s var(--ease);box-shadow:var(--shadow);-webkit-tap-highlight-color:transparent;user-select:none}
.cat-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.cat-card.selected{border-color:var(--accent);background:var(--accent-soft)}
.cat-card .cat-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px}
.cat-card .cat-name{font-size:11px;font-weight:700;color:var(--text);text-align:center;line-height:1.2;max-width:90%}
.cat-card .cat-sub{font-size:9px;color:var(--text-3);text-align:center;line-height:1.2;position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:3px 8px;border-radius:var(--r-sm);white-space:nowrap;font-weight:500;opacity:0;pointer-events:none;transition:opacity 0.2s;z-index:100}
.cat-card.selected .cat-sub{opacity:1}

/* ═══════════════════════════════════════════
   HIGH-END DETAIL CARDS - The Hero Stack
   ═══════════════════════════════════════════ */

/* Month Navigator */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-nav .mn-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s var(--ease);-webkit-tap-highlight-color:transparent;font-size:14px}
.month-nav .mn-btn:hover{background:var(--surface-2)}
.month-nav .mn-month{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.01em}
.month-nav .mn-year{font-size:12px;color:var(--text-3);font-weight:600}

/* The Hero Card - Double Bezel Architecture */
.hero-card-wrap{margin-bottom:14px}
.hero-card-outer{
  background: linear-gradient(135deg, rgba(91,140,90,0.08) 0%, rgba(91,140,90,0.02) 100%);
  padding: 3px;
  border-radius: var(--r-xl);
  box-shadow: var(--shadow-float);
  border: 1px solid rgba(91,140,90,0.12);
}
.hero-card-inner{
  background: linear-gradient(135deg, #FAFCFA 0%, #F5F8F5 100%);
  border-radius: calc(var(--r-xl) - 3px);
  padding: 24px 20px;
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.8);
  position: relative;
  overflow: hidden;
}
/* Subtle glow orb in background */
.hero-card-inner::before{
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(91,140,90,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.hero-card-top{
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px;
}
.hero-card-label{
  font-size: 11px;
  font-weight: 700;
  color: var(--text-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.hero-card-trend{
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--success);
  background: var(--success-bg);
  padding: 4px 10px;
  border-radius: var(--r-full);
}
.hero-card-amount{
  font-size: 42px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.03em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  margin-bottom: 20px;
}
.hero-card-currency{
  font-size: 18px;
  font-weight: 600;
  color: var(--text-3);
  margin-right: 4px;
}

/* Stats Row - Glass Pill */
.stats-row{
  display: flex;
  gap: 10px;
}
.stat-pill{
  flex: 1;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: var(--r-lg);
  padding: 14px 12px;
  border: 1px solid rgba(0,0,0,0.04);
  text-align: center;
  transition: all 0.3s var(--ease);
}
.stat-pill:hover{
  background: rgba(255,255,255,0.8);
  transform: translateY(-1px);
}
.stat-pill .sp-icon{
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--surface-2);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 8px;
  font-size: 13px;
}
.stat-pill .sp-label{
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.03em;
  margin-bottom: 4px;
}
.stat-pill .sp-value{
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.stat-pill .sp-unit{
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
}

/* Transactions List */
.transactions-list{display:flex;flex-direction:column;gap:6px}
.tx-group{display:flex;flex-direction:column;gap:3px}
.tx-date{font-size:10px;font-weight:700;color:var(--text-3);padding:10px 4px 6px;letter-spacing:0.03em;text-transform:uppercase}
.tx-row{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:var(--r-md);padding:12px 14px;box-shadow:var(--shadow);border:1px solid var(--border);transition:all 0.3s var(--ease)}
.tx-row:hover{transform:translateX(2px)}
.tx-row .tx-dot{width:36px;height:36px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.tx-row .tx-info{flex:1;min-width:0}
.tx-row .tx-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.2}
.tx-row .tx-time{font-size:10px;color:var(--text-3);margin-top:2px;font-weight:500}
.tx-row .tx-amt{font-size:15px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums}
.tx-row .tx-tag{font-size:9px;font-weight:700;color:var(--text-3);background:var(--surface-2);padding:3px 8px;border-radius:var(--r-full);text-transform:uppercase;letter-spacing:0.05em}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;text-align:center;gap:12px}
.empty .e-icon{font-size:56px;opacity:0.2}
.empty .e-title{font-size:15px;font-weight:800;color:var(--text-2);letter-spacing:-0.01em}
.empty .e-desc{font-size:12px;color:var(--text-3);max-width:220px;line-height:1.5;font-weight:500}

/* Overview Bento */
.bento{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.bento-card{background:var(--surface);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow);border:1px solid var(--border)}
.bento-card.span-2{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center}
.bento-card .bc-label{font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:0.03em}
.bento-card .bc-val{font-size:24px;font-weight:800;color:var(--text);margin-top:2px;line-height:1}
.bento-card .bc-val.success{color:var(--success)}
.bento-card .bc-val.danger{color:var(--danger)}
.bento-card .bc-sub{font-size:11px;color:var(--text-3);margin-top:2px}

/* Period Chips */
.period-row{display:flex;gap:6px;margin-bottom:10px}
.period-chip{flex:1;padding:9px 0;text-align:center;border-radius:var(--r-full);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.4s var(--ease);background:var(--surface-2);color:var(--text-2);-webkit-tap-highlight-color:transparent;user-select:none;border:1px solid transparent}
.period-chip.active{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(91,140,90,0.22)}

/* Bar Chart - Relative to each category's own budget */
.bar-card{padding:20px 16px}
.bar-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.bar-header-row .bh-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:0.03em}
.bar-header-row .bh-legend{display:flex;gap:16px;font-size:10px;font-weight:600;color:var(--text-3)}
.bar-header-row .bh-legend span{display:flex;align-items:center;gap:4px}
.bar-header-row .bh-legend .bh-dot{width:8px;height:8px;border-radius:2px}

.bar-list{display:flex;flex-direction:column;gap:12px}
.bar-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r-lg);background:transparent;transition:all 0.3s var(--ease);position:relative}
.bar-row:hover{background:var(--surface-2)}
.bar-row .br-left{display:flex;align-items:center;gap:10px;width:100px;flex-shrink:0}
.bar-row .br-dot{width:32px;height:32px;border-radius:var(--r-sm);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 6px rgba(0,0,0,0.08)}
.bar-row .br-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.2}
.bar-row .br-track-wrap{flex:1;min-width:0;display:flex;align-items:center;gap:10px}
.bar-row .br-track{flex:1;height:38px;background:var(--surface-2);border-radius:var(--r-sm);position:relative;overflow:hidden;min-width:0}
.bar-row .br-fill{height:100%;border-radius:var(--r-sm);transition:width 0.8s var(--ease);display:flex;align-items:center;padding-left:12px;font-size:12px;font-weight:600;min-width:0}
.br-fill.under{background:var(--success);box-shadow:0 2px 8px rgba(74,158,92,0.25)}
.br-fill.over{background:var(--danger);box-shadow:0 2px 8px rgba(217,74,74,0.25)}
.br-fill .bf-label{color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 2px rgba(0,0,0,0.15)}
.bar-row .br-stat{width:72px;text-align:right;flex-shrink:0;display:flex;flex-direction:column;gap:2px}
.bar-row .br-stat .br-pct{font-size:15px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums}
.bar-row .br-stat .br-info{font-size:10px;font-weight:600}
.br-info.under-text{color:var(--success)}
.br-info.over-text{color:var(--danger)}

/* Settings */
.sec{margin-bottom:14px}
.sec-t{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px}
.input-total{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:var(--r-md);padding:0 16px;height:50px;box-shadow:var(--shadow);border:1px solid var(--border)}
.input-total:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.input-total .it-pre{font-size:16px;font-weight:700;color:var(--text-3)}
.input-total input{flex:1;border:none;outline:none;background:transparent;font-family:var(--font);font-size:22px;font-weight:700;color:var(--text);caret-color:var(--accent);font-variant-numeric:tabular-nums}
.input-total input::placeholder{color:var(--text-3);font-weight:500;font-size:16px}

/* Unsaved Badge */
.unsaved-badge{display:inline-flex;align-items:center;gap:4px;margin-left:8px;font-size:10px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:2px 8px;border-radius:var(--r-full);opacity:0;transform:scale(0.8);transition:all 0.3s var(--ease)}
.unsaved-badge.show{opacity:1;transform:scale(1)}

/* Fixed Expenses */
.fixed-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.fixed-row{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:var(--r-md);padding:12px 12px;box-shadow:var(--shadow);border:1px solid var(--border);transition:all 0.3s var(--ease)}
.fixed-row:active{transform:scale(0.98)}
.fixed-row .fr-cat{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.fixed-row .fr-info{flex:1;min-width:0}
.fixed-row .fr-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.2}
.fixed-row .fr-catname{font-size:10px;color:var(--text-3);margin-top:1px}
.fixed-row .fr-amt{font-size:14px;font-weight:700;color:var(--text-2);font-variant-numeric:tabular-nums;flex-shrink:0}
.fixed-row .fr-del{width:26px;height:26px;border-radius:50%;background:var(--danger-bg);color:var(--danger);border:none;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.fixed-total{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:var(--r-md);background:var(--surface-2);font-size:12px;font-weight:600;color:var(--text-2)}
.fixed-total span:last-child{font-size:16px;font-weight:800;color:var(--text)}
.btn-add{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;height:42px;border:1.5px dashed var(--border);border-radius:var(--r-md);background:transparent;color:var(--text-2);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.3s var(--ease)}
.btn-add:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

/* Sliders */
.slider-list{display:flex;flex-direction:column;gap:0;background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow);border:1px solid var(--border);padding:4px 14px}
.slider-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.slider-row:last-child{border-bottom:none}
.slider-row .sr-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0}
.slider-row .sr-name{width:48px;font-size:11px;font-weight:700;color:var(--text);flex-shrink:0}
.slider-row input[type="range"]{flex:1;-webkit-appearance:none;appearance:none;height:3px;background:var(--surface-2);border-radius:2px;outline:none}
.slider-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:var(--surface);border:2px solid var(--accent);box-shadow:0 2px 6px rgba(0,0,0,0.08);cursor:pointer;transition:transform 0.15s var(--ease)}
.slider-row input[type="range"]::-webkit-slider-thumb:active{transform:scale(1.2)}
.slider-row .sr-val{width:42px;font-size:13px;font-weight:800;text-align:right;flex-shrink:0;color:var(--text)}
.slider-row .sr-amt{width:48px;font-size:9px;color:var(--text-3);text-align:right;flex-shrink:0}
.slider-sum{display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:var(--r-md);margin-top:8px;font-size:13px;font-weight:700}
.slider-sum.ok{background:var(--success-bg);color:var(--success)}
.slider-sum.bad{background:var(--danger-bg);color:var(--danger)}
.slider-sum .ss-val{font-size:20px;font-weight:800}

/* Category Selector Dialog */
.cat-selector{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
.cat-opt{padding:10px 4px;border-radius:var(--r-md);background:var(--surface-2);border:1.5px solid transparent;cursor:pointer;transition:all 0.3s var(--ease);text-align:center}
.cat-opt:hover{background:var(--surface)}
.cat-opt.selected{border-color:var(--accent);background:var(--accent-soft)}
.cat-opt .co-dot{width:28px;height:28px;border-radius:50%;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:14px}
.cat-opt .co-name{font-size:9px;font-weight:600;color:var(--text)}

/* Dialogs */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.35);backdrop-filter:blur(4px);z-index:2500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.4s var(--ease)}
.overlay.show{opacity:1;pointer-events:auto}
.dialog{background:var(--surface);border-radius:var(--r-xl);padding:20px;width:320px;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-float);transform:scale(0.94) translateY(10px);transition:transform 0.4s var(--ease)}
.overlay.show .dialog{transform:scale(1) translateY(0)}
.dialog .dl-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:4px}
.dialog .dl-body{font-size:13px;color:var(--text-2);margin-bottom:14px;line-height:1.5}
.dialog .dl-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.dialog .dl-row label{font-size:12px;font-weight:600;color:var(--text-2);width:50px;flex-shrink:0}
.dialog .dl-row input{flex:1;height:40px;border:1px solid var(--border);border-radius:var(--r-md);padding:0 12px;font-family:var(--font);font-size:14px;font-weight:600;color:var(--text)}
.dialog .dl-row input:focus{outline:none;border-color:var(--accent)}
.dialog .dl-actions{display:flex;gap:8px;margin-top:14px}
.dialog .dl-actions button{flex:1;height:44px;border-radius:var(--r-full);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 0.3s var(--ease)}
.dialog .dl-cancel{background:var(--surface-2);color:var(--text-2)}
.dialog .dl-confirm{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(91,140,90,0.25)}

/* Toast */
.toast{position:absolute;top:54px;left:50%;transform:translateX(-50%) translateY(-20px);max-width:300px;width:calc(100% - 32px);padding:12px 18px;border-radius:var(--r-md);font-size:13px;font-weight:600;z-index:3000;opacity:0;pointer-events:none;transition:all 0.5s var(--ease);font-family:var(--font);text-align:center;box-shadow:var(--shadow-float)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast.success{background:var(--success-bg);color:#2D6A3E;border:1px solid rgba(74,158,92,0.15)}
.toast.error{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(217,74,74,0.15)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);filter:blur(3px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
.up{animation:fadeUp 0.6s var(--ease) forwards;opacity:0}
.d1{animation-delay:0.04s}.d2{animation-delay:0.08s}.d3{animation-delay:0.12s}.d4{animation-delay:0.16s}.d5{animation-delay:0.2s}
</style>
</head>
<body>
<div class="iphone" id="app">
  <div class="dynamic-island"></div>

  <!-- FABs -->

  <div class="overlay" id="fixedDialog"><div class="dialog"><div class="dl-title" id="fixedDialogTitle">新增固定支出</div><div class="dl-body"><div class="dl-row"><label>名稱</label><input type="text" id="fdName" placeholder="例如：房租"></div><div class="dl-row"><label>金額</label><input type="text" id="fdAmount" placeholder="15000" inputmode="decimal"></div><div style="font-size:11px;font-weight:600;color:var(--text-2);margin:8px 0 6px">選擇分類</div><div class="cat-selector" id="catSelector"></div></div><div class="dl-actions"><button class="dl-cancel" onclick="closeDialog('fixedDialog')">取消</button><button class="dl-confirm" onclick="saveFixedExpense()">儲存</button></div></div></div>

  <!-- Content -->

    <!-- TAB 1: Record -->

    <!-- ═══════════════════════════════════════════

         ═══════════════════════════════════════════ -->
    <div class="tab" id="tab-detail">
      <div class="hdr up"><div class="hdr-tag">Detail</div><div class="hdr-title">明細</div><div class="hdr-sub">按月檢視記帳記錄</div></div>

      <!-- Month Navigator -->
      <div class="month-nav up d1">
        <button class="mn-btn" onclick="prevMonth()">◀</button>
        <div style="text-align:center"><div class="mn-month" id="detailMonth">2026年 6月</div></div>
        <button class="mn-btn" onclick="nextMonth()">▶</button>
      </div>

      <!-- ═══ THE HERO CARD - Double Bezel ═══ -->
      <div class="hero-card-wrap up d2">
        <div class="hero-card-outer">
          <div class="hero-card-inner">
            <div class="hero-card-top">
              <span class="hero-card-label">本月總支出</span>
              <span class="hero-card-trend" id="heroTrend">↗ +12%</span>
            </div>
            <div class="hero-card-amount">
              <span class="hero-card-currency">NT$</span>
              <span id="detailTotal">0</span>
            </div>
            <!-- Stats Pills Row -->

                <div class="sp-label">記帳筆數</div>

              <div class="stat-pill">

    <!-- TAB 3: Overview -->

      <div class="period-row up d1" id="periodChips"></div>

        <div class="bar-header-row">
          <span class="bh-title">分類占預算比例</span>
          <div class="bh-legend">
            <span><span class="bh-dot" style="background:var(--success)"></span>預算內</span>
            <span><span class="bh-dot" style="background:var(--danger)"></span>超支</span>
          </div>
        </div>
        <div class="bar-list" id="barChart"></div>
      </div>

    <!-- TAB 4: Settings -->
    <div class="tab" id="tab-settings">
      <div class="hdr up"><div class="hdr-tag">Settings</div><div class="hdr-title">設定<span class="unsaved-badge" id="unsavedBadge">● 未儲存</span></div><div class="hdr-sub">調整月預算、固定支出與分類比例</div></div>
      <div class="sec up d1"><div class="sec-t">月預算總額</div><div class="input-total"><span class="it-pre">NT$</span><input type="text" id="budgetTotalInput" placeholder="35,000" inputmode="decimal" value="35000"></div></div>
      <div class="sec up d2"><div class="sec-t">每月固定支出</div><div class="fixed-list" id="fixedList"></div><div class="fixed-total" id="fixedTotalRow"><span>固定支出合計</span><span>NT$ 0</span></div><button class="btn-add" onclick="openFixedDialog()">＋ 新增固定支出</button></div>
      <div class="sec up d3"><div class="sec-t">分類比例</div><div class="slider-list" id="sliderList"></div><div class="slider-sum ok" id="sliderSum"><span>總和</span><span class="ss-val" id="sumTotal">100%</span></div></div>
    </div>
  </div>

  <!-- TabBar -->
  <div class="tabbar">
    <div class="tabbar-inner">
      <div class="tab-item active" data-tab="tab-record" onclick="switchTab('tab-record')"><span class="ti-icon">📝</span><span class="ti-label">記帳</span></div>
      <div class="tab-item" data-tab="tab-detail" onclick="switchTab('tab-detail')"><span class="ti-icon">📋</span><span class="ti-label">明細</span></div>
      <div class="tab-item" data-tab="tab-overview" onclick="switchTab('tab-overview')"><span class="ti-icon">📊</span><span class="ti-label">總覽</span></div>
      <div class="tab-item" data-tab="tab-settings" onclick="switchTab('tab-settings')"><span class="ti-icon">⚙️</span><span class="ti-label">設定</span></div>
    </div>
  </div>
</div>

<script>
/* DATA */
const categories=[
  {id:'tithe',name:'十一奉獻',sub:'薪資10%歸還給神',pct:10,color:'#C47DA7',icon:'✝️'},
  {id:'filial',name:'孝親費',sub:'父母長輩孝親金',pct:10,color:'#D4A057',icon:'👨‍👩‍👧'},
  {id:'social',name:'交際費',sub:'請客送禮邀約',pct:10,color:'#7DAEBF',icon:'🎉'},
  {id:'housing',name:'租房買房',sub:'房租房貸居住相關',pct:20,color:'#8C7DC4',icon:'🏠'},
  {id:'debt',name:'還款存款',sub:'理財保障相關',pct:10,color:'#5B7FAD',icon:'💰'},
  {id:'food',name:'生活必需',sub:'三餐交通水電瓦斯',pct:30,color:'#5B8C5A',icon:'🍽️'},
  {id:'flexible',name:'彈性運用',sub:'購物電話費娛樂',pct:10,color:'#C47D6B',icon:'👕'},
];
const barDataMap={
  '本月':[{cat:categories[0],actual:2800,budget:3500},{cat:categories[1],actual:3200,budget:3500},{cat:categories[2],actual:1500,budget:3500},{cat:categories[3],actual:7500,budget:7000},{cat:categories[4],actual:3000,budget:3500},{cat:categories[5],actual:6200,budget:10500},{cat:categories[6],actual:2600,budget:3500}],
  '近3月':[{cat:categories[0],actual:7800,budget:10500},{cat:categories[1],actual:9200,budget:10500},{cat:categories[2],actual:5400,budget:10500},{cat:categories[3],actual:22000,budget:21000},{cat:categories[4],actual:8800,budget:10500},{cat:categories[5],actual:24800,budget:31500},{cat:categories[6],actual:8200,budget:10500}],
  '近6月':[{cat:categories[0],actual:15800,budget:21000},{cat:categories[1],actual:17500,budget:21000},{cat:categories[2],actual:11200,budget:21000},{cat:categories[3],actual:44000,budget:42000},{cat:categories[4],actual:16800,budget:21000},{cat:categories[5],actual:52000,budget:63000},{cat:categories[6],actual:17100,budget:21000}],
  '近12月':[{cat:categories[0],actual:31000,budget:42000},{cat:categories[1],actual:34000,budget:42000},{cat:categories[2],actual:23000,budget:42000},{cat:categories[3],actual:87000,budget:84000},{cat:categories[4],actual:34000,budget:42000},{cat:categories[5],actual:108000,budget:126000},{cat:categories[6],actual:33000,budget:42000}],
};
const periods=['本月','近3月','近6月','近12月'];let currentPeriod='本月';

/* Mock Transactions */
const mockTransactions={
  '2026-06':[
    {id:1,date:'2026-06-14',catId:'food',name:'午餐',amount:180,tag:'食'},{id:2,date:'2026-06-14',catId:'flexible',name:'Netflix',amount:390,tag:'訂閱'},{id:3,date:'2026-06-13',catId:'food',name:'超市採買',amount:850,tag:'食'},{id:4,date:'2026-06-12',catId:'housing',name:'房租',amount:15000,tag:'住'},{id:5,date:'2026-06-11',catId:'tithe',name:'十一奉獻',amount:5000,tag:'十一'},{id:6,date:'2026-06-10',catId:'filial',name:'媽媽生日禮金',amount:3000,tag:'孝親'},{id:7,date:'2026-06-08',catId:'food',name:'加油',amount:800,tag:'行'},{id:8,date:'2026-06-05',catId:'social',name:'朋友聚餐',amount:650,tag:'交際'},{id:9,date:'2026-06-03',catId:'debt',name:'保險費',amount:3000,tag:'保險'},{id:10,date:'2026-06-01',catId:'food',name:'晚餐',amount:320,tag:'食'},
  ],
  '2026-05':[{id:11,date:'2026-05-28',catId:'housing',name:'房租',amount:15000,tag:'住'},{id:12,date:'2026-05-25',catId:'food',name:'週末聚餐',amount:1200,tag:'食'},{id:13,date:'2026-05-20',catId:'tithe',name:'十一奉獻',amount:5000,tag:'十一'},{id:14,date:'2026-05-15',catId:'flexible',name:'買衣服',amount:1500,tag:'衣'},{id:15,date:'2026-05-10',catId:'debt',name:'保險費',amount:3000,tag:'保險'},{id:16,date:'2026-05-01',catId:'food',name:'交通卡儲值',amount:500,tag:'行'}],
  '2026-04':[{id:17,date:'2026-04-28',catId:'housing',name:'房租',amount:15000,tag:'住'},{id:18,date:'2026-04-20',catId:'tithe',name:'十一奉獻',amount:5000,tag:'十一'},{id:19,date:'2026-04-12',catId:'food',name:'水電費',amount:2200,tag:'水電'},{id:20,date:'2026-04-05',catId:'debt',name:'信用卡帳單',amount:8500,tag:'還款'}],
};
let detailYear=2026,detailMonth=6;

/* State */
let state={amount:'',selectedCat:null,isRec:false,recStart:0};
let sliderRatios=categories.map(c=>c.pct);
let fixedExpenses=[{id:1,catId:'housing',name:'房租',amount:15000},{id:2,catId:'debt',name:'保險費',amount:3000},{id:3,catId:'flexible',name:'Netflix 訂閱',amount:390}];
let editingFixedId=null,selectedFixedCatId=null;
let originalSettings={budgetTotal:35000,fixedExpenses:JSON.parse(JSON.stringify(fixedExpenses)),sliderRatios:[...sliderRatios]};
let hasUnsavedChanges=false;

/* Init */
document.addEventListener('DOMContentLoaded',()=>{renderCatGrid();renderDetail();renderPeriodChips();renderOverview();renderFixedList();renderSliders();bindEvents();});
function bindEvents(){
  document.getElementById('amountInput').addEventListener('input',e=>{state.amount=e.target.value;updateHero();updateFab();});
  document.getElementById('budgetTotalInput').addEventListener('input',()=>{renderSliders();checkChanges();});
  const vb=document.getElementById('voiceBtn');vb.addEventListener('mousedown',startRec);vb.addEventListener('mouseup',stopRec);vb.addEventListener('mouseleave',stopRec);vb.addEventListener('touchstart',e=>{e.preventDefault();startRec()});vb.addEventListener('touchend',stopRec);
}

/* Tabs & FABs */
function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');document.querySelector(`.tab-item[data-tab="${id}"]`).classList.add('active');document.getElementById('contentArea').scrollTop=0;
  document.getElementById('fabRecordWrap').classList.toggle('show',id==='tab-record'&&parseFloat(state.amount)>0&&state.selectedCat);
  document.getElementById('fabSaveWrap').classList.toggle('show',id==='tab-settings'&&hasUnsavedChanges);
}
function updateFab(){const rec=document.querySelector('.tab.active')?.id==='tab-record';document.getElementById('fabRecordWrap').classList.toggle('show',rec&&parseFloat(state.amount)>0&&state.selectedCat);}
function updateSaveFab(){const set=document.querySelector('.tab.active')?.id==='tab-settings';document.getElementById('fabSaveWrap').classList.toggle('show',set&&hasUnsavedChanges);}

/* Record */
function updateHero(){const el=document.getElementById('heroNum'),v=parseFloat(state.amount);if(v>0){el.textContent=v.toLocaleString();el.className='hero-num';}else{el.textContent='輸入金額';el.className='hero-num placeholder';}}
function renderCatGrid(){document.getElementById('catGrid').innerHTML=categories.map(c=>`<div class="cat-card" data-cat="${c.id}" onclick="selectCat('${c.id}')"><div class="cat-dot" style="background:${c.color}">${c.icon}</div><div class="cat-name">${c.name}</div><div class="cat-sub">${c.sub}</div></div>`).join('');}
function selectCat(id){state.selectedCat=id;document.querySelectorAll('.cat-card').forEach(el=>el.classList.remove('selected'));document.querySelector(`.cat-card[data-cat="${id}"]`).classList.add('selected');updateFab();}
const mockRes=[{text:'食行兩百五',amount:250,cat:'food'},{text:'十一五千',amount:5000,cat:'tithe'},{text:'孝親三千',amount:3000,cat:'filial'},{text:'交際八百',amount:800,cat:'social'},{text:'房租一萬二',amount:12000,cat:'housing'}];
function startRec(){if(state.isRec)return;state.isRec=true;document.getElementById('voiceBtn').classList.add('recording');document.getElementById('voiceBtn').textContent='🔴';document.getElementById('voiceHint').textContent='正在聆聽...';document.getElementById('voiceHint').style.color='var(--danger)';state.recStart=Date.now();showToast('正在聆聽...','');}
function stopRec(){if(!state.isRec)return;state.isRec=false;document.getElementById('voiceBtn').classList.remove('recording');document.getElementById('voiceBtn').textContent='🎤';document.getElementById('voiceHint').textContent='長按說話，說「分類＋金額」';document.getElementById('voiceHint').style.color='';if(Date.now()-state.recStart<300){showToast('錄音太短','error');return;}const r=mockRes[Math.floor(Math.random()*mockRes.length)];document.getElementById('amountInput').value=r.amount;state.amount=String(r.amount);updateHero();selectCat(r.cat);showToast(`辨識：${r.text}`,'success');}
function showConfirmDialog(){const c=categories.find(x=>x.id===state.selectedCat);if(!c)return;document.getElementById('confirmBody').innerHTML=`金額：<strong>NT$ ${parseFloat(state.amount).toLocaleString()}</strong><br>分類：<strong>${c.icon} ${c.name}</strong>`;document.getElementById('confirmDialog').classList.add('show');}
function closeDialog(id){document.getElementById(id).classList.remove('show');}
function doRecord(){
  closeDialog('confirmDialog');const key=`${detailYear}-${String(detailMonth).padStart(2,'0')}`;if(!mockTransactions[key])mockTransactions[key]=[];mockTransactions[key].unshift({id:Date.now(),date:`${detailYear}-${String(detailMonth).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`,catId:state.selectedCat,name:categories.find(c=>c.id===state.selectedCat)?.name||'',amount:parseFloat(state.amount),time:new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false}),tag:categories.find(c=>c.id===state.selectedCat)?.name?.charAt(0)||''});
  document.getElementById('amountInput').value='';state.amount='';state.selectedCat=null;updateHero();updateFab();document.querySelectorAll('.cat-card').forEach(el=>el.classList.remove('selected'));document.getElementById('heroNum').textContent='輸入金額';document.getElementById('heroNum').className='hero-num placeholder';renderDetail();showToast('記帳成功 ✓','success');
}

/* Detail - High-End */
function prevMonth(){if(detailMonth===1){detailMonth=12;detailYear--;}else{detailMonth--;}renderDetail();}
function nextMonth(){const now=new Date();if(detailYear===now.getFullYear()&&detailMonth===now.getMonth()+1)return;if(detailMonth===12){detailMonth=1;detailYear++;}else{detailMonth++;}renderDetail();}
function renderDetail(){
  document.getElementById('detailMonth').textContent=`${detailYear}年 ${detailMonth}月`;
  const key=`${detailYear}-${String(detailMonth).padStart(2,'0')}`;
  const txs=mockTransactions[key]||[];
  const total=txs.reduce((s,t)=>s+t.amount,0),count=txs.length;
  const max=count>0?Math.max(...txs.map(t=>t.amount)):0;
  const daysInMonth=new Date(detailYear,detailMonth,0).getDate();
  const daysPassed=Math.min(new Date().getDate(),daysInMonth);
  const avg=count>0?Math.round(total/count):0;
  // Update hero card
  document.getElementById('detailTotal').textContent=total.toLocaleString();
  document.getElementById('detailCount').innerHTML=`${count}<span class="sp-unit"> 筆</span>`;
  document.getElementById('detailAvg').textContent=`NT$ ${avg.toLocaleString()}`;
  document.getElementById('detailMax').textContent=`NT$ ${max.toLocaleString()}`;
  // Trend calculation (vs previous month)
  const prevKey=`${detailYear}-${String(detailMonth-1||12).padStart(2,'0')}`;
  const prevTxs=mockTransactions[prevKey]||[];const prevTotal=prevTxs.reduce((s,t)=>s+t.amount,0);
  const trendEl=document.getElementById('heroTrend');
  if(prevTotal>0){const pct=Math.round((total-prevTotal)/prevTotal*100);trendEl.textContent=(pct>=0?'↗ ':'↘ ')+Math.abs(pct)+'%';trendEl.style.color=pct>0?'var(--danger)':'var(--success)';}else{trendEl.textContent='—';trendEl.style.color='var(--text-3)';}
  // Transaction list
  if(txs.length===0){document.getElementById('transactionsList').innerHTML=`<div class="empty"><div class="e-icon">📭</div><div class="e-title">尚無記帳記錄</div><div class="e-desc">回到「記帳」頁面開始記錄第一筆吧</div></div>`;return;}
  const groups={};txs.forEach(t=>{const d=t.date;(groups[d]=groups[d]||[]).push(t);});
  document.getElementById('transactionsList').innerHTML=Object.keys(groups).sort().reverse().map(date=>`
    <div class="tx-group">
      <div class="tx-date">${new Date(date).toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'short'})}</div>
      ${groups[date].map(t=>{
        const c=categories.find(x=>x.id===t.catId);
        return`<div class="tx-row">
          <div class="tx-dot" style="background:${c.color}">${c.icon}</div>
          <div class="tx-info"><div class="tx-name">${t.name}</div></div>
          <div class="tx-tag">${t.tag}</div>
          <div class="tx-amt">NT$ ${t.amount.toLocaleString()}</div>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

/* Overview */
function renderPeriodChips(){document.getElementById('periodChips').innerHTML=periods.map(p=>`<div class="period-chip ${p===currentPeriod?'active':''}" onclick="switchPeriod('${p}')">${p}</div>`).join('');}
function switchPeriod(p){currentPeriod=p;renderPeriodChips();renderOverview();}
function renderOverview(){const data=barDataMap[currentPeriod],spent=data.reduce((s,d)=>s+d.actual,0),budget=data.reduce((s,d)=>s+d.budget,0),remain=budget-spent,pct=((spent/budget)*100).toFixed(1);document.getElementById('bentoArea').innerHTML=`<div class="bento-card"><div class="bc-label">總花費</div><div class="bc-val">${spent.toLocaleString()}</div><div class="bc-sub">NT$</div></div><div class="bento-card"><div class="bc-label">月預算</div><div class="bc-val">${budget.toLocaleString()}</div><div class="bc-sub">NT$</div></div><div class="bento-card span-2"><div><div class="bc-label">預算使用率</div><div class="bc-val ${remain<0?'danger':'success'}" style="font-size:32px">${pct}%</div></div><div style="text-align:right"><div class="bc-label">${remain>=0?'剩餘':'超支'}</div><div class="bc-val ${remain<0?'danger':'success'}" style="font-size:22px">${remain>=0?'':'-'}${Math.abs(remain).toLocaleString()}</div><div class="bc-sub">NT$</div></div></div>`;document.getElementById('barChart').innerHTML=data.map((d,i)=>{const catPct=Math.min(((d.actual/d.budget)*100),150),over=d.actual>d.budget,w=Math.min(catPct,150),diff=d.actual-d.budget,infoClass=over?'over-text':'under-text';return`<div class="bar-row up" style="animation-delay:${i*0.06}s"><div class="br-left"><div class="br-dot" style="background:${d.cat.color}">${d.cat.icon}</div><div class="br-name">${d.cat.name.substring(0,5)}</div></div><div class="br-track-wrap"><div class="br-track"><div class="br-fill ${over?'over':'under'}" style="width:${Math.min(w,100)}%;${over&&w>100?'width:100%;opacity:0.85;animation:barOverflow 0.6s var(--ease);':''}"><span class="bf-label">${catPct>8?d.actual.toLocaleString():''}</span></div></div><div class="br-stat"><div class="br-pct">${catPct.toFixed(0)}%</div><div class="br-info ${infoClass}">${over?'+':''}${diff.toLocaleString()} ${over?'⚠':''}</div></div></div></div>`}).join('');}

/* Settings */
function checkChanges(){const curBudget=parseFloat(document.getElementById('budgetTotalInput').value)||35000;const budgetChanged=curBudget!==originalSettings.budgetTotal;const ratiosChanged=JSON.stringify(sliderRatios)!==JSON.stringify(originalSettings.sliderRatios);const fixedChanged=JSON.stringify(fixedExpenses)!==JSON.stringify(originalSettings.fixedExpenses);hasUnsavedChanges=budgetChanged||ratiosChanged||fixedChanged;document.getElementById('unsavedBadge').classList.toggle('show',hasUnsavedChanges);updateSaveFab();}
function renderFixedList(){const el=document.getElementById('fixedList');if(fixedExpenses.length===0){el.innerHTML=`<div style="text-align:center;padding:24px;background:var(--surface);border-radius:var(--r-md);border:1px dashed var(--border)"><div style="font-size:32px;opacity:0.3;margin-bottom:6px">📋</div><div style="font-size:12px;color:var(--text-3)">尚無固定支出，點擊下方新增</div></div>`;}else{el.innerHTML=fixedExpenses.map(f=>{const c=categories.find(x=>x.id===f.catId);return`<div class="fixed-row" onclick="editFixed(${f.id})"><div class="fr-cat" style="background:${c.color}">${c.icon}</div><div class="fr-info"><div class="fr-name">${f.name}</div><div class="fr-catname">${c.name}</div></div><span class="fr-amt">NT$ ${f.amount.toLocaleString()}</span><button class="fr-del" onclick="event.stopPropagation();deleteFixed(${f.id})">×</button></div>`;}).join('');}const total=fixedExpenses.reduce((s,f)=>s+f.amount,0);document.getElementById('fixedTotalRow').innerHTML=`<span>固定支出合計</span><span>NT$ ${total.toLocaleString()}</span>`;checkChanges();}
function openFixedDialog(id=null){editingFixedId=id;selectedFixedCatId=null;document.getElementById('fixedDialogTitle').textContent=id?'編輯固定支出':'新增固定支出';document.getElementById('catSelector').innerHTML=categories.map(c=>`<div class="cat-opt" data-cat="${c.id}" onclick="selectFixedCat('${c.id}')"><div class="co-dot" style="background:${c.color}">${c.icon}</div><div class="co-name">${c.name}</div></div>`).join('');if(id){const f=fixedExpenses.find(x=>x.id===id);document.getElementById('fdName').value=f.name;document.getElementById('fdAmount').value=f.amount;selectFixedCat(f.catId);}else{document.getElementById('fdName').value='';document.getElementById('fdAmount').value='';}document.getElementById('fixedDialog').classList.add('show');}
function selectFixedCat(catId){selectedFixedCatId=catId;document.querySelectorAll('.cat-opt').forEach(el=>el.classList.remove('selected'));document.querySelector(`.cat-opt[data-cat="${catId}"]`).classList.add('selected');}
function saveFixedExpense(){const name=document.getElementById('fdName').value.trim(),amt=parseFloat(document.getElementById('fdAmount').value)||0;if(!name||amt<=0){showToast('請輸入名稱和有效金額','error');return;}if(!selectedFixedCatId){showToast('請選擇分類','error');return;}if(editingFixedId){const f=fixedExpenses.find(x=>x.id===editingFixedId);f.name=name;f.amount=amt;f.catId=selectedFixedCatId;}else{fixedExpenses.push({id:Date.now(),catId:selectedFixedCatId,name,amount:amt});}closeDialog('fixedDialog');renderFixedList();}
function editFixed(id){openFixedDialog(id);}
function deleteFixed(id){if(!confirm('確定刪除？'))return;fixedExpenses=fixedExpenses.filter(f=>f.id!==id);renderFixedList();showToast('已刪除','success');}
function renderSliders(){const total=parseFloat(document.getElementById('budgetTotalInput').value)||35000;document.getElementById('sliderList').innerHTML=categories.map((c,i)=>{const amt=Math.round(total*sliderRatios[i]/100);return`<div class="slider-row"><div class="sr-dot" style="background:${c.color}"></div><div class="sr-name">${c.name.substring(0,5)}</div><input type="range" min="0" max="100" value="${sliderRatios[i]}" step="1" oninput="onSliderChange(${i},this.value)"><div class="sr-val">${sliderRatios[i]}%</div><div class="sr-amt">${amt.toLocaleString()}</div></div>`;}).join('');updateSliderSum();checkChanges();}
function onSliderChange(idx,newVal){newVal=parseInt(newVal);const old=sliderRatios[idx],delta=newVal-old;if(delta===0)return;const others=sliderRatios.reduce((s,v,i)=>i!==idx?s+v:s,0),target=100-newVal;if(others===0){const per=target/(sliderRatios.length-1);sliderRatios=sliderRatios.map((v,i)=>i===idx?newVal:per);}else if(target<=0){sliderRatios[idx]=100;sliderRatios=sliderRatios.map((v,i)=>i===idx?100:0);}else{sliderRatios[idx]=newVal;const scale=target/others;for(let i=0;i<sliderRatios.length;i++){if(i!==idx)sliderRatios[i]=Math.round(sliderRatios[i]*scale);}const sum=sliderRatios.reduce((a,b)=>a+b,0);if(sum!==100){let mi=-1,mv=-1;for(let i=0;i<sliderRatios.length;i++){if(i!==idx&&sliderRatios[i]>mv){mv=sliderRatios[i];mi=i;}}if(mi>=0)sliderRatios[mi]+=(100-sum);}}sliderRatios=sliderRatios.map(v=>Math.max(0,Math.min(100,v)));renderSliders();checkChanges();}
function updateSliderSum(){const sum=sliderRatios.reduce((a,b)=>a+b,0);document.getElementById('sumTotal').textContent=sum+'%';document.getElementById('sliderSum').className='slider-sum '+(sum===100?'ok':'bad');}
function saveSettings(){if(sliderRatios.reduce((a,b)=>a+b,0)!==100){showToast('比例總和必須為 100%！','error');return;}if((parseFloat(document.getElementById('budgetTotalInput').value)||0)<=0){showToast('請輸入有效的月預算總額','error');return;}originalSettings.budgetTotal=parseFloat(document.getElementById('budgetTotalInput').value)||35000;originalSettings.fixedExpenses=JSON.parse(JSON.stringify(fixedExpenses));originalSettings.sliderRatios=[...sliderRatios];hasUnsavedChanges=false;checkChanges();updateSaveFab();showToast('設定已儲存 ✓','success');}

let tt;function showToast(msg,type){const t=document.getElementById('toast');clearTimeout(tt);t.textContent=msg;t.className='toast '+type;void t.offsetWidth;t.classList.add('show');tt=setTimeout(()=>t.classList.remove('show'),2200);}
</script>
