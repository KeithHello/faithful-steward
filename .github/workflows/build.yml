name: Build FaithfulSteward

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  # Job 1: 仅验证编译是否通过（最快，无需签名）
  validate:
    name: Validate compilation
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for simulator (no signing required)
        run: |
          xcodebuild build \
            -project FaithfulSteward.xcodeproj \
            -scheme FaithfulSteward \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project FaithfulSteward.xcodeproj \
            -scheme FaithfulSteward \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

  # Job 2: 构建 .ipa（需要 Apple Developer 账号，供安装到手机）
  export-ipa:
    name: Export .ipa
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive app
        run: |
          xcodebuild archive \
            -project FaithfulSteward.xcodeproj \
            -scheme FaithfulSteward \
            -configuration Release \
            -archivePath $RUNNER_TEMP/FaithfulSteward.xcarchive \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE="Manual"

      - name: Export .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/FaithfulSteward.xcarchive \
            -exportPath $RUNNER_TEMP/FaithfulSteward.ipa \
            -exportOptionsPlist .github/export-options.plist

      - name: Upload .ipa as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FaithfulSteward-ipa
          path: ${{ runner.temp }}/FaithfulSteward.ipa/FaithfulSteward.ipa
